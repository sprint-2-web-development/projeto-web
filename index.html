<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>projeto web</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Zen+Dots&display=swap" rel="stylesheet">
</head>
<body>
    <h1>PROJETO WEB</h1>
    <h2>Infinity Code</h2>
     <!-- criar conta -->
    <div class="criar-conta">
        <!-- criando conta -->
        <h3>
            Criar Conta
        </h3>
        <input type="text"id="novoUsuario" placeholder="Novo usuário">
        <input type="password" id="novaSenha" placeholder="Nova senha">
        <button onclick="criarConta()">
            Criar Conta
        </button>
     </div>
     <!-- login do usuário -->
     <div class="login">
         <h3>Login</h3>
         <input type="text" id="usuario" placeholder="Usuário">
         <input type="password" id="senha" placeholder="Senha">
         <button onclick="login()">
             Entrar
            </button>
            <!-- criação do formulário -->
            <div class="formulario">
                <h3>Contato</h3>
                <input type="text" id="nome" placeholder="Nome">
                
                <input type="email" id="email" placeholder="Email">
                <button onclick="formulario()">
                    Enviar
                </button>
            </div>
            <!-- slideshow -->
            <div>
                <img id="slide" src="slide1.webp" alt="">
                
            </div>
            
            <button onclick="slideshow()">
                passar imagem
            </button>
            <!-- evento DOM -->
            <h3>clique no botão</h3>
            <button id="botaoDOM">clique aqui</button>
            <p id="evento"></p>
        </div>
        <script src="codigo.js"></script>
</body>
</html>
